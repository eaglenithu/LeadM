<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LeadM — Lead Management</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0F172A;color:#E2E8F0;min-height:100vh}
  
  /* TOP BAR */
  .topbar{background:#1E293B;border-bottom:1px solid #334155;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .logo{font-size:18px;font-weight:700;color:#F8FAFC;letter-spacing:-0.3px}
  .logo span{color:#0D9488}
  .badge-count{background:#0D9488;color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px}
  .topbar-right{display:flex;align-items:center;gap:10px}
  
  /* NOTIFICATION BELL button styles removed — replaced by floating panel (leadm_dashboard style) */
  
  /* MAIN */
  .main{padding:24px;max-width:1600px;margin:0 auto}
  
  /* FILTER BAR */
  .filter-bar{background:#1E293B;border:1px solid #334155;border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .filter-bar label{font-size:12px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  .filter-btns{display:flex;gap:8px;flex-wrap:wrap}
  .filter-btn{padding:6px 16px;border-radius:20px;border:1px solid #334155;background:transparent;color:#94A3B8;font-size:13px;cursor:pointer;transition:all .2s;font-family:inherit}
  .filter-btn:hover{border-color:#0D9488;color:#0D9488}
  .filter-btn.active{background:#0D9488;border-color:#0D9488;color:#fff;font-weight:600}
  .filter-btn.all{border-color:#475569}
  .filter-btn.all.active{background:#475569;border-color:#475569}
  
  /* STATS ROW */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .stat-card{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:14px 16px}
  .stat-label{font-size:11px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .stat-value{font-size:24px;font-weight:700;line-height:1}
  .stat-card.all .stat-value{color:#94A3B8}
  .stat-card.success .stat-value{color:#16A34A}
  .stat-card.unsuccess .stat-value{color:#DC2626}
  .stat-card.followup .stat-value{color:#4ADE80}
  .stat-card.noanswer .stat-value{color:#EAB308}
  
  /* TABLE WRAPPER */
  .table-wrap{background:#1E293B;border:1px solid #334155;border-radius:12px;overflow:hidden}
  .table-header{padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
  .table-header-actions{display:flex;align-items:center;gap:8px}
  .table-title{font-size:14px;font-weight:600;color:#F8FAFC}
  .table-sub{font-size:12px;color:#64748B;margin-top:2px}
  .save-btn{background:#0D9488;border:none;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
  .save-btn:hover{background:#0F766E}
  .save-btn:disabled{background:#334155;color:#64748B;cursor:not-allowed}
  .search-btn{background:#1E3A5F;border:1px solid #3B82F6;color:#93C5FD;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px}
  .search-btn:hover{background:#2563EB;border-color:#2563EB;color:#fff}
  .search-bar{display:none;padding:12px 20px;border-top:1px solid #334155;background:#0F172A;align-items:center;gap:10px;flex-wrap:wrap}
  .search-bar.visible{display:flex}
  .search-input{background:#1E293B;border:1px solid #334155;border-radius:8px;color:#E2E8F0;padding:8px 12px;font-size:13px;font-family:inherit;flex:1;min-width:200px;max-width:360px;transition:border-color .2s}
  .search-input:focus{outline:none;border-color:#3B82F6;box-shadow:0 0 0 2px rgba(59,130,246,.2)}
  .search-input::placeholder{color:#475569}
  .search-go-btn{background:#2563EB;border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
  .search-go-btn:hover{background:#1D4ED8}
  .search-clear-btn{background:#334155;border:none;color:#94A3B8;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
  .search-clear-btn:hover{background:#475569;color:#F8FAFC}
  .search-hint{font-size:12px;color:#64748B}
  
  .tbl-outer{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:1100px}
  thead tr{background:#0F172A}
  th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;border-bottom:1px solid #1E293B}
  td{padding:10px 14px;border-bottom:1px solid #1E293B;font-size:13px;vertical-align:middle;color:#CBD5E1}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(13,148,136,.05)}
  
  /* CELL INPUTS */
  .cell-input{background:#0F172A;border:1px solid #334155;border-radius:6px;color:#E2E8F0;padding:5px 8px;font-size:13px;font-family:inherit;width:100%;min-width:130px;transition:border-color .2s}
  .cell-input:focus{outline:none;border-color:#0D9488;box-shadow:0 0 0 2px rgba(13,148,136,.2)}
  input[type="date"].cell-input,input[type="time"].cell-input{min-width:120px}
  
  /* STATUS DROPDOWN */
  .status-select{border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;appearance:none;-webkit-appearance:none;text-align:center;outline:none;transition:all .2s}
  .status-select.success{background:#16A34A;color:#ffffff;border:2px solid #15803D}
  .status-select.unsuccess{background:#DC2626;color:#ffffff;border:2px solid #B91C1C}
  .status-select.followup{background:#EAB308;color:#1C1917;border:2px solid #CA8A04}
  .status-select.noanswer{background:#FFECD2;color:#C2185B;border:2px solid #F8BBD0}
  
  /* ROW status color tinting */
  tr.row-success td{background:rgba(22,163,74,.10) !important}
  tr.row-unsuccess td{background:rgba(220,38,38,.10) !important}
  tr.row-followup td{background:rgba(234,179,8,.08) !important}
  tr.row-noanswer td{background:rgba(255,236,210,.07) !important}
  tr.row-success:hover td{background:rgba(22,163,74,.18) !important}
  tr.row-unsuccess:hover td{background:rgba(220,38,38,.18) !important}
  tr.row-followup:hover td{background:rgba(234,179,8,.15) !important}
  tr.row-noanswer:hover td{background:rgba(194,24,91,.10) !important}
  
  /* TICKET ID CHIP */
  .ticket-id{background:#0F172A;border:1px solid #334155;border-radius:6px;padding:3px 8px;font-size:12px;font-family:'Courier New',monospace;color:#7DD3FC;white-space:nowrap}
  
  /* CHANGED ROW INDICATOR */
  tr.changed td{background:rgba(13,148,136,.08)}
  
  /* =============================================
     BELL BUTTON (topbar)
     ============================================= */
  .bell-btn { position: relative; background: none; border: 1px solid #334155; border-radius: 8px; padding: 7px 11px; color: #94A3B8; cursor: pointer; font-size: 18px; line-height: 1; transition: all .2s; display: flex; align-items: center; }
  .bell-btn:hover { background: #334155; color: #F8FAFC; border-color: #475569; }
  .bell-count { position: absolute; top: -6px; right: -6px; background: #EF4444; color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #0F172A; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.75;transform:scale(1.15)} }

  /* =============================================
     NOTIFICATION DRAWER PANEL
     ============================================= */
  .notif-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 400; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .notif-overlay.open { opacity: 1; pointer-events: all; }
  #notif-panel { position: fixed; top: 0; right: -380px; width: 360px; height: 100vh; background: #1E293B; border-left: 1px solid #334155; z-index: 401; display: flex; flex-direction: column; transition: right .32s cubic-bezier(.4,0,.2,1); box-shadow: -8px 0 32px rgba(0,0,0,.4); }
  #notif-panel.open { right: 0; }
  .notif-panel-header { padding: 18px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; background: #1E293B; flex-shrink: 0; }
  .notif-panel-title { font-size: 15px; font-weight: 700; color: #F8FAFC; display: flex; align-items: center; gap: 8px; }
  .notif-panel-badge { background: #EF4444; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
  .notif-close-btn { background: none; border: 1px solid #334155; border-radius: 8px; color: #94A3B8; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .2s; flex-shrink: 0; }
  .notif-close-btn:hover { background: #EF4444; border-color: #EF4444; color: #fff; }
  .notif-list { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .notif-card { background: #0F172A; border-radius: 10px; padding: 14px 16px; border-left: 4px solid #f59e0b; cursor: pointer; transition: background .15s; animation: slideIn .3s ease; }
  .notif-card:hover { background: #162032; }
  .notif-card.overdue { border-left-color: #EF4444; }
  .notif-title { font-size: 11px; font-weight: 700; color: #FCD34D; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .4px; }
  .notif-card.overdue .notif-title { color: #FCA5A5; }
  .notif-name { font-size: 14px; font-weight: 600; color: #F8FAFC; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .notif-time { font-size: 12px; color: #94A3B8; margin-bottom: 6px; }
  .notif-badge { display: inline-block; background: rgba(245,158,11,.18); color: #FCD34D; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; border: 1px solid rgba(245,158,11,.3); }
  .notif-badge.overdue { background: rgba(239,68,68,.18); color: #FCA5A5; border-color: rgba(239,68,68,.3); }
  .notif-empty { text-align: center; padding: 48px 20px; color: #475569; }
  .notif-empty-icon { font-size: 40px; margin-bottom: 10px; }
  .notif-empty-text { font-size: 13px; color: #64748B; }
  @keyframes slideIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  /* END NOTIFICATION PANEL */

  /* =============================================
     POPUP ALERTS (auto-appear top-right)
     ============================================= */
  .popup-area { position: fixed; top: 68px; right: 20px; z-index: 500; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
  .popup-notif { background: #1E293B; border: 1px solid #334155; border-radius: 12px; padding: 14px 16px; min-width: 300px; max-width: 340px; pointer-events: all; box-shadow: 0 8px 32px rgba(0,0,0,.55); border-left: 4px solid #f59e0b; animation: popSlideIn .35s cubic-bezier(.175,.885,.32,1.275); display: flex; flex-direction: column; gap: 5px; }
  .popup-notif.overdue { border-left-color: #EF4444; }
  @keyframes popSlideIn { from { opacity: 0; transform: translateX(60px) scale(.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
  @keyframes popSlideOut { to { opacity: 0; transform: translateX(70px) scale(.92); } }
  .popup-notif-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .popup-notif-body { flex: 1; min-width: 0; }
  .popup-notif-label { font-size: 11px; font-weight: 700; color: #FCD34D; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
  .popup-notif.overdue .popup-notif-label { color: #FCA5A5; }
  .popup-notif-name { font-size: 13px; font-weight: 600; color: #F8FAFC; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .popup-notif-info { font-size: 12px; color: #94A3B8; }
  .popup-notif-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(245,158,11,.18); border: 1px solid rgba(245,158,11,.3); border-radius: 6px; padding: 3px 9px; font-size: 12px; font-weight: 700; color: #FCD34D; width: fit-content; }
  .popup-notif-badge.overdue { background: rgba(239,68,68,.18); border-color: rgba(239,68,68,.3); color: #FCA5A5; }
  .popup-notif-close { background: none; border: 1px solid #334155; border-radius: 6px; color: #64748B; cursor: pointer; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; transition: all .2s; line-height: 1; }
  .popup-notif-close:hover { background: #EF4444; border-color: #EF4444; color: #fff; }
  .popup-notif-actions { display: flex; gap: 6px; margin-top: 2px; }
  .popup-btn { border: none; border-radius: 6px; padding: 5px 11px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; }
  .popup-btn-hide { background: #334155; color: #94A3B8; }
  .popup-btn-hide:hover { background: #475569; color: #F8FAFC; }
  .popup-btn-view { background: #0D9488; color: #fff; }
  .popup-btn-view:hover { background: #0F766E; }
  /* END POPUP ALERTS */

  /* LOADING */
  .loading{text-align:center;padding:40px;color:#64748B}
  .spinner{width:32px;height:32px;border:3px solid #334155;border-top-color:#0D9488;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  
  /* TOAST */
  .toast-area{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:12px 16px;font-size:13px;color:#E2E8F0;min-width:260px;display:flex;align-items:center;gap:10px;pointer-events:all;animation:slideUp .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
  .toast.success-toast{border-left:3px solid #22C55E}
  .toast.error-toast{border-left:3px solid #EF4444}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  
  .sync-status{font-size:12px;color:#64748B;display:flex;align-items:center;gap:6px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;display:inline-block}

  /* (popup-area styles removed — replaced by floating notif-panel from leadm_dashboard) */
  
  @media(max-width:768px){
    .main{padding:12px}
    .filter-bar{padding:12px}
    #notif-panel{width:240px}
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Lead<span>M</span></div>
    <div class="badge-count" id="total-count">0</div>
  </div>
  <div class="topbar-right">
    <div class="sync-status" id="sync-status"><span class="sync-dot"></span>Connected</div>
    <!-- Bell button — opens notification drawer -->
    <button class="bell-btn" id="bell-btn" onclick="toggleNotifPanel()" title="Follow-up Notifications">
      🔔
      <span class="bell-count" id="bell-count" style="display:none">0</span>
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card all"><div class="stat-label">Total</div><div class="stat-value" id="s-all">—</div></div>
    <div class="stat-card success"><div class="stat-label">Success</div><div class="stat-value" id="s-success">—</div></div>
    <div class="stat-card unsuccess"><div class="stat-label">Unsuccess</div><div class="stat-value" id="s-unsuccess">—</div></div>
    <div class="stat-card followup"><div class="stat-label">Follow Up</div><div class="stat-value" id="s-followup">—</div></div>
    <div class="stat-card noanswer"><div class="stat-label">No Answer</div><div class="stat-value" id="s-noanswer">—</div></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <label>Filter by status:</label>
    <div class="filter-btns">
      <button class="filter-btn all active" data-filter="all" onclick="applyFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="Success" onclick="applyFilter('Success',this)">✅ Success</button>
      <button class="filter-btn" data-filter="Unsuccess" onclick="applyFilter('Unsuccess',this)">❌ Unsuccess</button>
      <button class="filter-btn" data-filter="Follow up" onclick="applyFilter('Follow up',this)">🔁 Follow Up</button>
      <button class="filter-btn" data-filter="No answer" onclick="applyFilter('No answer',this)">📵 No Answer</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header">
      <div>
        <div class="table-title">Lead Records</div>
        <div class="table-sub" id="showing-label">Loading...</div>
      </div>
      <div class="table-header-actions">
      <button class="save-btn" id="save-btn" onclick="saveChanges()" disabled>
        💾 Save Changes
      </button>
      <button class="search-btn" id="search-toggle-btn" onclick="toggleSearchBar()">
        🔍 Search
      </button>
      </div>
    </div>
    <div class="search-bar" id="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Search by Ticket ID or Decedent Name…" oninput="doSearch()" onkeydown="if(event.key==='Escape')clearSearch()">
      <button class="search-go-btn" onclick="doSearch()">Search</button>
      <button class="search-clear-btn" id="search-clear-btn" onclick="clearSearch()" style="display:none">✕ Clear</button>
      <span class="search-hint" id="search-hint"></span>
    </div>
    <div class="tbl-outer">
      <div id="table-area"><div class="loading"><div class="spinner"></div>Loading from Google Sheets...</div></div>
    </div>
  </div>

</div>

<!-- NOTIFICATION OVERLAY -->
<div class="notif-overlay" id="notif-overlay" onclick="toggleNotifPanel()"></div>

<!-- NOTIFICATION DRAWER PANEL -->
<div id="notif-panel">
  <div class="notif-panel-header">
    <div class="notif-panel-title">
      🔔 Follow-up Alerts
      <span class="notif-panel-badge" id="notif-panel-badge" style="display:none">0</span>
    </div>
    <button class="notif-close-btn" onclick="toggleNotifPanel()" title="Close">✕</button>
  </div>
  <div class="notif-list" id="notif-list">
    <div class="notif-empty">
      <div class="notif-empty-icon">🎉</div>
      <div class="notif-empty-text">No upcoming follow-ups for today or tomorrow</div>
    </div>
  </div>
</div>
<!-- END NOTIFICATION DRAWER -->

<!-- POPUP ALERTS AREA (auto-appear top-right) -->
<div class="popup-area" id="popup-area"></div>
<!-- END POPUP ALERTS -->

<!-- TOAST AREA -->
<div class="toast-area" id="toast-area"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4Dmhrlxj5mhduK2paGQfi_-fL8Ozlvzci-mk2fnDEHVASEV9YZTsxtXsf4ECJ6v4/exec';

let allData = [];
let headers = [];
let changedRows = new Set();
let currentFilter = 'all';
let dismissedNotifs = new Set();
let searchQuery = '';

const STATUS_OPTIONS = ['Success','Unsuccess','Follow up','No answer'];
const STATUS_CLASS = {
  'Success':'success',
  'Unsuccess':'unsuccess',
  'Follow up':'followup',
  'No answer':'noanswer'
};

const DATE_COL_KEYWORDS   = ['follow up date','follow-up date','next follow','date'];
const TIME_COL_KEYWORDS   = ['follow up time','follow-up time','follow time','time'];
const STATUS_COL_KEYWORDS = ['ticket status','status'];
const TICKET_COL_KEYWORDS = ['ticket id','ticket no','ticket#','ticket'];
const READONLY_KEYWORDS   = [];

function colType(h){
  const l = h.toLowerCase();
  // Check status FIRST before time (since "ticket status" would otherwise match "time" via substring)
  if(STATUS_COL_KEYWORDS.some(k=>l===k||l.includes(k))) return 'status';
  if(TICKET_COL_KEYWORDS.some(k=>l===k||l.includes(k))) return 'ticket';
  if(DATE_COL_KEYWORDS.some(k=>l.includes(k)))   return 'date';
  if(TIME_COL_KEYWORDS.some(k=>l.includes(k)))   return 'time';
  return 'text';
}

async function loadData(){
  try{
    const res = await fetch(SCRIPT_URL+'?action=get');
    const json = await res.json();
    if(json.error) throw new Error(json.error);
    headers = json.headers;
    // Find the "number" column (phone number, contact number, etc.)
    const numCI = json.headers.findIndex(h => {
      const l = h.toLowerCase();
      return l.includes('number') || l.includes('phone') || l.includes('mobile') || l.includes('contact');
    });
    // Only keep rows that have a value in the number column
    allData = numCI > -1
      ? json.data.filter(row => {
          const val = String(row[numCI] ?? '').trim();
          return val !== '' && val !== '0';
        })
      : json.data;
    renderTable();
    updateStats();
    buildNotifications();
    setSyncStatus(true);
  }catch(e){
    document.getElementById('table-area').innerHTML=
      `<div class="loading" style="color:#EF4444">⚠️ Failed to load: ${e.message}<br><small>Check SCRIPT_URL and deploy settings</small></div>`;
    document.getElementById('showing-label').textContent='Error loading data';
    setSyncStatus(false);
  }
}

function setSyncStatus(ok){
  const el=document.getElementById('sync-status');
  el.innerHTML=ok
    ?'<span class="sync-dot"></span>Connected'
    :'<span class="sync-dot" style="background:#EF4444"></span>Disconnected';
}

function renderTable(){
  // Base filter by status
  let rows = currentFilter==='all'
    ? allData
    : allData.filter(r=>{
        const si = headers.findIndex(h=>colType(h)==='status');
        return si>-1 && r[si]===currentFilter;
      });

  // Apply search filter if active
  let searchActive = searchQuery.trim() !== '';
  if(searchActive){
    const q = searchQuery.trim().toLowerCase();
    const ticketCI = headers.findIndex(h=>colType(h)==='ticket');
    const nameCI = headers.findIndex(h=>{
      const l=h.toLowerCase();
      return l.includes('name')||l.includes('customer')||l.includes('lead')||l.includes('decedent');
    });
    rows = rows.filter(r=>{
      const ticketVal = ticketCI>-1 ? String(r[ticketCI]??'').toLowerCase() : '';
      const nameVal   = nameCI>-1   ? String(r[nameCI]??'').toLowerCase()   : '';
      return ticketVal===q || nameVal.includes(q);
    });
  }

  document.getElementById('total-count').textContent = allData.length;
  document.getElementById('showing-label').textContent =
    searchActive
      ? `Found ${rows.length} result${rows.length!==1?'s':''} for "${searchQuery.trim()}" (of ${allData.length} records)`
      : `Showing ${rows.length} of ${allData.length} records`;

  if(!rows.length){
    document.getElementById('table-area').innerHTML=
      searchActive
        ? `<div class="loading">🔍 No matching ticket found for "<strong>${escHtml(searchQuery.trim())}</strong>".</div>`
        : `<div class="loading">No records match the selected filter.</div>`;
    return;
  }

  let html=`<table><thead><tr>`;
  headers.forEach(h=>{ html+=`<th>${h}</th>`; });
  html+=`</tr></thead><tbody>`;

  rows.forEach((row,ri)=>{
    const realIdx = allData.indexOf(row);
    const si = headers.findIndex(h=>colType(h)==='status');
    const statusVal = si>-1 ? (row[si]??'').toString() : '';
    const rowCls = STATUS_CLASS[statusVal] ? `row-${STATUS_CLASS[statusVal]}` : '';
    html+=`<tr id="row-${realIdx}" class="${rowCls}${changedRows.has(realIdx)?' changed':''}">`;
    headers.forEach((h,ci)=>{
      const type=colType(h);
      const val=(row[ci]??'').toString();
      html+=`<td>`;
      if(type==='ticket'){
        html+=`<span class="ticket-id">${val||'—'}</span>`;
      } else if(type==='status'){
        const cls=STATUS_CLASS[val]||'followup';
        html+=`<select class="status-select ${cls}" onchange="onCellChange(${realIdx},${ci},this.value,this)">`; 
        STATUS_OPTIONS.forEach(s=>{
          html+=`<option value="${s}" ${val===s?'selected':''}>${s}</option>`;
        });
        html+=`</select>`;
      } else if(type==='date'){
        html+=`<input type="date" class="cell-input" value="${toDateInput(val)}" onchange="onCellChange(${realIdx},${ci},this.value)">`;
      } else if(type==='time'){
        html+=`<input type="time" class="cell-input" value="${toTimeInput(val)}" onchange="onCellChange(${realIdx},${ci},this.value)">`;
      } else {
        html+=`<input type="text" class="cell-input" value="${escHtml(val)}" onchange="onCellChange(${realIdx},${ci},this.value)">`;
      }
      html+=`</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table>`;
  document.getElementById('table-area').innerHTML=html;
}

function toDateInput(v){
  if(!v) return '';
  const s = String(v).trim();
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // DD/MM/YYYY or DD-MM-YYYY
  const dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(dmy) return dmy[3]+'-'+dmy[2].padStart(2,'0')+'-'+dmy[1].padStart(2,'0');
  // MM/DD/YYYY
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy) return mdy[3]+'-'+mdy[1].padStart(2,'0')+'-'+mdy[2].padStart(2,'0');
  // "DD Mon, YYYY" or "DD Mon YYYY"  e.g. "12 Jul, 2020" or "19 Jun 2022"
  const MONTHS = {jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',
                  jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
  const mname = s.match(/^(\d{1,2})\s+([A-Za-z]{3})[,\s]+(\d{4})$/);
  if(mname){
    const mo = MONTHS[mname[2].toLowerCase()];
    if(mo) return mname[3]+'-'+mo+'-'+mname[1].padStart(2,'0');
  }
  // "Mon DD, YYYY"  e.g. "Jul 12, 2020"
  const mname2 = s.match(/^([A-Za-z]{3})\s+(\d{1,2})[,\s]+(\d{4})$/);
  if(mname2){
    const mo = MONTHS[mname2[1].toLowerCase()];
    if(mo) return mname2[3]+'-'+mo+'-'+mname2[2].padStart(2,'0');
  }
  // Fallback: native Date parse (extract LOCAL parts to avoid UTC shift)
  const d = new Date(s);
  if(!isNaN(d)) return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return '';
}
function toTimeInput(v){
  if(!v && v!==0) return '';
  const s = String(v).trim();

  // HH:MM:SS or H:MM:SS or HH:MM or H:MM  → extract first two parts
  const colonMatch = s.match(/^(\d{1,2}):(\d{2})/);
  if(colonMatch){
    return colonMatch[1].padStart(2,'0') + ':' + colonMatch[2];
  }

  // Google Sheets decimal fraction of a day (e.g. 0.5 = 12:00)
  const num = parseFloat(s);
  if(!isNaN(num) && num >= 0 && num < 1){
    const totalMins = Math.round(num * 1440);
    const hh = Math.floor(totalMins / 60);
    const mm = totalMins % 60;
    return String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
  }

  // ISO datetime string e.g. "1899-12-30T23:40:00.000Z"
  if(s.includes('T') || (s.includes(' ') && s.includes(':'))){
    const d = new Date(s);
    if(!isNaN(d)){
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
  }

  return '';
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onCellChange(rowIdx, colIdx, value, el){
  allData[rowIdx][colIdx] = value;
  changedRows.add(rowIdx);
  const tr=document.getElementById(`row-${rowIdx}`);
  if(tr) tr.classList.add('changed');
  if(el && el.tagName==='SELECT'){
    const cls=STATUS_CLASS[value]||'followup';
    el.className=`status-select ${cls}`;
    // Update row background class
    if(tr){
      Object.values(STATUS_CLASS).forEach(c=>tr.classList.remove('row-'+c));
      tr.classList.add('row-'+cls);
    }
  }
  document.getElementById('save-btn').disabled=false;
  buildNotifications();
}

function applyFilter(f, btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function toggleSearchBar(){
  const bar = document.getElementById('search-bar');
  bar.classList.toggle('visible');
  if(bar.classList.contains('visible')){
    document.getElementById('search-input').focus();
  } else {
    clearSearch();
  }
}

function doSearch(){
  const q = document.getElementById('search-input').value;
  searchQuery = q;
  const hasQ = q.trim() !== '';
  document.getElementById('search-clear-btn').style.display = hasQ ? 'inline-block' : 'none';
  document.getElementById('search-hint').textContent = '';
  renderTable();
}

function clearSearch(){
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear-btn').style.display = 'none';
  document.getElementById('search-hint').textContent = '';
  renderTable();
}
// ── END SEARCH ──

function updateStats(){
  document.getElementById('s-all').textContent=allData.length;
  const si=headers.findIndex(h=>colType(h)==='status');
  const count=k=>si>-1?allData.filter(r=>r[si]===k).length:0;
  document.getElementById('s-success').textContent=count('Success');
  document.getElementById('s-unsuccess').textContent=count('Unsuccess');
  document.getElementById('s-followup').textContent=count('Follow up');
  document.getElementById('s-noanswer').textContent=count('No answer');
}

// =============================================
// NOTIFICATIONS — Bell + Slide-in Drawer Panel
// Bell in topbar → opens right-side drawer
// Cards show today + tomorrow follow-ups
// =============================================

function toggleNotifPanel() {
  const panel   = document.getElementById('notif-panel');
  const overlay = document.getElementById('notif-overlay');
  panel.classList.toggle('open');
  overlay.classList.toggle('open');
}

function buildNotifications() {
  const list = document.getElementById('notif-list');
  if (!list) return;

  // Guard: nothing to do until data is loaded
  if (!allData.length || !headers.length) return;

  // Find FOLLOW-UP date column — prefer specific keywords over generic "date"
  let dateCI = headers.findIndex(h => {
    const l = h.toLowerCase();
    return l.includes('follow up date') || l.includes('follow-up date') || l.includes('next follow') || l.includes('followup date');
  });
  if (dateCI === -1) dateCI = headers.findIndex(h => { const l = h.toLowerCase(); return l.includes('follow') && l.includes('date'); });
  if (dateCI === -1) dateCI = headers.findIndex(h => colType(h) === 'date');

  // Find FOLLOW-UP time column
  let timeCI = headers.findIndex(h => {
    const l = h.toLowerCase();
    return l.includes('follow up time') || l.includes('follow-up time') || l.includes('followup time');
  });
  if (timeCI === -1) timeCI = headers.findIndex(h => colType(h) === 'time');

  const ticketCI = headers.findIndex(h => colType(h) === 'ticket');
  let nameCI = headers.findIndex(h => {
    const l = h.toLowerCase();
    return l.includes('name') || l.includes('customer') || l.includes('lead') || l.includes('decedent');
  });
  if (nameCI === -1) nameCI = Math.min(1, headers.length - 1);

  if (dateCI === -1) {
    console.warn('[Notif] No follow-up date column found in headers:', headers);
    return;
  }

  const now = new Date();
  function localDateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  const todayStr = localDateStr(now);
  const tmrw = new Date(now); tmrw.setDate(tmrw.getDate() + 1);
  const tmrwStr = localDateStr(tmrw);

  console.log('[Notif] dateCI=' + dateCI + ' timeCI=' + timeCI + ' ticketCI=' + ticketCI + ' nameCI=' + nameCI);
  console.log('[Notif] today=' + todayStr + ' rows=' + allData.length);

  // Collect rows whose follow-up date is today or tomorrow
  // Skip rows with terminal statuses — their notifications should be removed
  const TERMINAL_STATUSES = ['No answer', 'Success', 'Unsuccess'];
  const statusCI = headers.findIndex(h => colType(h) === 'status');

  const alertRows = allData
    .map((row, ri) => ({ row, ri }))
    .filter(({ row }) => {
      // Auto-remove: skip rows with terminal statuses
      if(statusCI > -1){
        const sv = (row[statusCI] ?? '').toString();
        if(TERMINAL_STATUSES.includes(sv)) return false;
      }
      const dateVal = row[dateCI];
      if (!dateVal && dateVal !== 0) return false;
      const dStr = toDateInput(String(dateVal));
      return dStr === todayStr || dStr === tmrwStr;
    });

  console.log('[Notif] alertRows found:', alertRows.length);

  // Update bell badge
  const bellCount = document.getElementById('bell-count');
  const panelBadge = document.getElementById('notif-panel-badge');
  if (bellCount) {
    bellCount.textContent = alertRows.length;
    bellCount.style.display = alertRows.length ? 'flex' : 'none';
  }
  if (panelBadge) {
    panelBadge.textContent = alertRows.length;
    panelBadge.style.display = alertRows.length ? 'inline-block' : 'none';
  }

  // ── Build alert data for each row ──
  const alerts = alertRows.map(({ row, ri }) => {
    const dateVal  = row[dateCI];
    const dStr     = toDateInput(String(dateVal));
    const isToday  = dStr === todayStr;
    const ticketId = ticketCI > -1 && row[ticketCI] ? String(row[ticketCI]) : '#' + (ri + 1);
    const name     = String(row[nameCI] || 'Lead');
    const timeVal  = timeCI > -1 && row[timeCI] !== undefined ? row[timeCI] : '';
    const tStr     = (timeVal !== '' && timeVal !== null) ? toTimeInput(String(timeVal)) : '';

    let hoursMsg = '';
    let isOverdue = false;

    if (tStr && /^\d{2}:\d{2}$/.test(tStr)) {
      const [hh, mm] = tStr.split(':').map(Number);
      const [yr, mo, dy] = dStr.split('-').map(Number);
      const followupMs = new Date(yr, mo - 1, dy, hh, mm).getTime();
      const diffMs = followupMs - now.getTime();
      if (diffMs < 0) {
        const hrs  = Math.floor(Math.abs(diffMs) / 3600000);
        const mins = Math.floor((Math.abs(diffMs) % 3600000) / 60000);
        hoursMsg  = 'Overdue by ' + hrs + 'h ' + mins + 'm';
        isOverdue = true;
      } else {
        const hrs  = Math.floor(diffMs / 3600000);
        const mins = Math.floor((diffMs % 3600000) / 60000);
        hoursMsg  = (isToday ? 'In ' : 'Tomorrow · In ') + hrs + 'h ' + mins + 'm';
      }
    } else {
      hoursMsg = isToday ? 'Today · Time not set' : 'Tomorrow · Time not set';
    }

    return { ri, ticketId, name, isToday, dStr, tStr, hoursMsg, isOverdue,
             titleLabel: isOverdue ? '⚠ Overdue' : (isToday ? '📅 Today' : '📅 Tomorrow'),
             sortMs: (() => {
               if (tStr && /^\d{2}:\d{2}$/.test(tStr)) {
                 const [hh, mm] = tStr.split(':').map(Number);
                 const [yr, mo, dy] = dStr.split('-').map(Number);
                 return new Date(yr, mo - 1, dy, hh, mm).getTime();
               }
               // No time set — sort after timed entries for that day
               const [yr, mo, dy] = dStr.split('-').map(Number);
               return new Date(yr, mo - 1, dy, 23, 59).getTime();
             })()
           };
  });

  // Sort: overdue first (closest overdue at top), then upcoming soonest first
  alerts.sort((a, b) => {
    if (a.isOverdue && !b.isOverdue) return -1;
    if (!a.isOverdue && b.isOverdue) return 1;
    if (a.isOverdue && b.isOverdue) return a.sortMs - b.sortMs; // most recently overdue first
    return a.sortMs - b.sortMs; // soonest upcoming first
  });

  // ── Render drawer panel list ──
  if (!alerts.length) {
    list.innerHTML = '<div class="notif-empty"><div class="notif-empty-icon">🎉</div><div class="notif-empty-text">No upcoming follow-ups for today or tomorrow</div></div>';
  } else {
    list.innerHTML = alerts.map(a =>
      '<div class="notif-card ' + (a.isOverdue ? 'overdue' : '') + '" id="panel-card-' + a.ri + '">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">' +
          '<div style="flex:1;min-width:0">' +
            '<div class="notif-title">' + (a.isOverdue ? '⚠ Overdue Followup' : (a.isToday ? '📅 Followup Today' : '📅 Followup Tomorrow')) + '</div>' +
            '<div class="notif-name">' + escHtml(a.name) + '</div>' +
            '<div class="notif-time">Ticket: ' + escHtml(a.ticketId) + (a.tStr ? ' · ' + a.tStr : '') + '</div>' +
            '<span class="notif-badge ' + (a.isOverdue ? 'overdue' : '') + '">' + a.hoursMsg + '</span>' +
          '</div>' +
        '</div>' +
        '<div style="margin-top:10px">' +
          '<button class="popup-btn popup-btn-view" onclick="scrollToRowAndClose(' + a.ri + ')" style="font-size:11px;padding:4px 10px">↗ Go to row</button>' +
        '</div>' +
      '</div>'
    ).join('');
  }

  // ── Show popup alerts (top-right) for new notifications only ──
  showPopupAlerts(alerts);
}

// Track which popups have already been shown this session
const _shownPopups = new Set();

function showPopupAlerts(alerts) {
  const area = document.getElementById('popup-area');
  if (!area) return;

  alerts.forEach(a => {
    if (_shownPopups.has(a.ticketId)) return; // already shown this session
    _shownPopups.add(a.ticketId);

    const el = document.createElement('div');
    el.className = 'popup-notif' + (a.isOverdue ? ' overdue' : '');
    el.id = 'popup-' + a.ri;
    el.innerHTML =
      '<div class="popup-notif-top">' +
        '<div class="popup-notif-body">' +
          '<div class="popup-notif-label">' + a.titleLabel + ' Follow-up</div>' +
          '<div class="popup-notif-name">' + escHtml(a.name) + '</div>' +
          '<div class="popup-notif-info">🎫 ' + escHtml(a.ticketId) + (a.tStr ? ' &nbsp;🕐 ' + a.tStr : '') + '</div>' +
        '</div>' +
        '<button class="popup-notif-close" onclick="closePopup(' + a.ri + ')" title="Dismiss">✕</button>' +
      '</div>' +
      '<span class="popup-notif-badge ' + (a.isOverdue ? 'overdue' : '') + '">' + a.hoursMsg + '</span>' +
      '<div class="popup-notif-actions">' +
        '<button class="popup-btn popup-btn-hide" onclick="closePopup(' + a.ri + ')">✕ Dismiss</button>' +
        '<button class="popup-btn popup-btn-view" onclick="toggleNotifPanel()">🔔 View All</button>' +
      '</div>';

    area.appendChild(el);

    // Auto-dismiss after 15 seconds
    setTimeout(() => closePopup(a.ri), 15000);
  });
}

function closePopup(rowIdx) {
  const el = document.getElementById('popup-' + rowIdx);
  if (!el) return;
  el.style.animation = 'popSlideOut .3s ease forwards';
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
}

function scrollToRowAndClose(rowIdx) {
  document.getElementById('notif-panel').classList.remove('open');
  document.getElementById('notif-overlay').classList.remove('open');
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const allBtn = document.querySelector('.filter-btn[data-filter="all"]');
  if (allBtn) allBtn.classList.add('active');
  renderTable();
  setTimeout(() => {
    const el = document.getElementById('row-' + rowIdx);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 120);
}
// END NOTIFICATIONS

// Auto-refresh notifications every minute
setInterval(buildNotifications, 60000);


async function saveChanges(){
  if(!changedRows.size) return;
  const btn=document.getElementById('save-btn');
  btn.disabled=true;
  btn.textContent='⏳ Saving...';

  const payload=[];
  changedRows.forEach(ri=>{
    payload.push({rowIndex:ri+2, values:allData[ri]});
  });

  // Google Apps Script rejects fetch() POSTs with application/json due to CORS preflight.
  // The reliable fix: POST with text/plain (no preflight) — Apps Script still reads e.postData.contents fine.
  // We also need redirect:'follow' but must handle the opaque redirect; using a blob workaround:
  try{
    const body = JSON.stringify({action:'update', rows:payload});

    // Use XMLHttpRequest which handles Apps Script's redirect correctly
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', SCRIPT_URL, true);
      xhr.setRequestHeader('Content-Type', 'text/plain'); // avoids CORS preflight
      xhr.onload = function(){
        try{
          const json = JSON.parse(xhr.responseText);
          if(json.error) reject(new Error(json.error));
          else resolve(json);
        } catch(e){
          // Apps Script sometimes returns empty on redirect — treat 200 as success
          if(xhr.status===200) resolve({success:true});
          else reject(new Error('Unexpected response: '+xhr.status));
        }
      };
      xhr.onerror = function(){ reject(new Error('Network error — check CORS/deploy settings')); };
      xhr.send(body);
    });

    changedRows.clear();
    document.querySelectorAll('tr.changed').forEach(r=>r.classList.remove('changed'));
    btn.textContent='✅ Saved!';
    setTimeout(()=>{btn.textContent='💾 Save Changes';btn.disabled=false;},2000);
    showToast('Changes saved to Google Sheets','success');
    updateStats();
  }catch(e){
    btn.disabled=false;
    btn.textContent='💾 Save Changes';
    showToast('Save failed: '+e.message,'error');
  }
}

function showToast(msg,type='success'){
  const area=document.getElementById('toast-area');
  const t=document.createElement('div');
  t.className=`toast ${type}-toast`;
  t.innerHTML=(type==='success'?'✅ ':'⚠️ ')+msg;
  area.appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

loadData();
setInterval(()=>{ if(!changedRows.size) loadData(); }, 120000);
